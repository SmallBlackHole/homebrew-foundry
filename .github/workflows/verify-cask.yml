name: Verify installers

on:
  push:
    branches: [main]
    paths:
      - "Casks/**"
      - ".github/workflows/verify-cask.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.arch }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest    # Apple Silicon
            arch: arm64
          - os: macos-15-intel  # Intel
            arch: x64
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_ANALYTICS: "1"
      # Authenticates the installer's GitHub calls (azd extension + skill) to avoid rate limits.
      # The cask forwards this to the binary as GH_TOKEN.
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Runner arch
        run: uname -m

      # Real user flow: tap the published repo and install by the fully-qualified cask name
      # (no local file). Exercises tap resolution + quarantine + the azure-cli dependency +
      # postflight (foundry-devpack --channel brew -> azd + extension + skill).
      - name: Tap
        run: brew tap SmallBlackHole/foundry

      - name: Audit cask (informational)
        continue-on-error: true
        run: brew audit --cask SmallBlackHole/foundry/devpack

      - name: Install cask (real smoke test)
        run: brew install --cask SmallBlackHole/foundry/devpack

      - name: Verify foundry-devpack on PATH
        run: |
          set -x
          command -v foundry-devpack
          foundry-devpack --help

      # Authoritative signature check for a bare CLI binary. (Notarization itself was already
      # exercised: the cask ran the QUARANTINED binary in postflight, which Gatekeeper would
      # have blocked if it were not notarized.)
      - name: Verify code signature
        run: |
          set -x
          bin="$(command -v foundry-devpack)"
          real="$(readlink "$bin" 2>/dev/null || echo "$bin")"
          echo "resolved binary: $real"
          codesign --verify --strict --verbose=2 "$real"
          codesign -dvvv "$real" 2>&1 | grep -Ei 'Authority|TeamIdentifier|Identifier='
          # spctl -t exec assesses APP BUNDLES only; a bare CLI is reported "rejected (... does
          # not seem to be an app)" even when validly signed + notarized, so this is informational.
          spctl -a -t exec -vv "$real" || echo "(spctl -t exec is app-only; codesign above is authoritative for a bare CLI)"

      # Assert every prerequisite the cask is supposed to leave behind (fails the job if any is
      # missing). If the azd extension is absent it usually means postflight deferred it because
      # azd wasn't on PATH yet -> the cask would then need a follow-up `foundry-devpack --ensure`.
      - name: Verify prerequisites installed
        run: |
          set -euxo pipefail
          # az — provided by the azure-cli Homebrew dependency
          az version
          # azd — installed by the binary during postflight
          azd version
          # azd Foundry extension (id: microsoft.foundry)
          azd ext list --installed
          azd ext list --installed | grep -qi 'microsoft\.foundry'
          # skill — verify real content, not just the directory
          test -f "$HOME/.agents/skills/microsoft-foundry/SKILL.md"
          ls -la "$HOME/.agents/skills/microsoft-foundry"

      - name: Uninstall + zap
        if: always()
        run: brew uninstall --zap --cask SmallBlackHole/foundry/devpack || true

  # Linux "script" channel: exercises the published, resolved install.sh from the release
  # (curl | bash). The bootstrapper downloads the linux binary, verifies its baked sha256, and
  # runs it (--channel curl); the binary itself is temporary (it sets up the prerequisites, then
  # the script cleans it up), so we assert the prerequisites, not foundry-devpack on PATH.
  verify-script:
    name: script ${{ matrix.arch }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest     # x64
            arch: x64
          - os: ubuntu-24.04-arm  # arm64
            arch: arm64
    env:
      # The installer authenticates its GitHub calls (azd extension + skill) with this to avoid
      # rate limits; the binary reads GITHUB_TOKEN / GH_TOKEN.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      INSTALL_SH_URL: "https://github.com/microsoft/foundry-toolkit/releases/download/devpack-installer-0.0.4/install.sh"
    steps:
      - name: Runner arch
        run: uname -m

      - name: Install via script (real smoke test)
        run: curl -fsSL "$INSTALL_SH_URL" | bash

      - name: Verify prerequisites installed
        run: |
          set -euxo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          # az (installed/verified by the binary on the curl channel)
          az version
          # azd (installed by the binary)
          azd version
          # azd Foundry extension (id: microsoft.foundry)
          azd ext list --installed
          azd ext list --installed | grep -qi 'microsoft\.foundry'
          # skill — verify real content, not just the directory
          test -f "$HOME/.agents/skills/microsoft-foundry/SKILL.md"
          ls -la "$HOME/.agents/skills/microsoft-foundry"
