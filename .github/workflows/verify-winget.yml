name: Verify winget

on:
  push:
    branches: [main]
    paths:
      - "winget/**"
      - ".github/workflows/verify-winget.yml"
  workflow_dispatch:

permissions:
  contents: read

# Smoke test for the winget channel. Installs the local multi-file manifest with
# `winget install --manifest --silent`, which downloads the signed 0.0.4 exe from
# the foundry-toolkit release and runs it (`--channel winget --ensure`), then
# asserts the prerequisites were provisioned.
#
# Notes learned the hard way:
#   * MUST pass `--silent` so winget applies the Silent InstallerSwitches
#     (`--channel winget --ensure`). With no args the exe defaults to
#     channel=direct and shells out to a NESTED `winget install` -> deadlock.
#   * Local manifests need `winget settings --enable LocalManifestFiles` (admin;
#     the runner is elevated).
#   * Windows verify anchors on the skill file, plus a registry PATH refresh for
#     az/azd, because winget writes user-PATH the same shell won't otherwise pick up.
#   * winget hosted runners are x64 only here; arm64 (windows-11-arm) winget
#     bootstrap is not reliable yet, so it's out of scope for now.
jobs:
  verify:
    name: winget x64
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      # The installer downloads release assets from GitHub; give it a token so it
      # isn't throttled by anonymous rate limits. winget runs the exe as a child
      # process, which inherits this environment.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST_DIR: winget/0.0.4
    steps:
      - uses: actions/checkout@v4

      - name: Ensure winget is available
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
            Write-Host "winget not found; bootstrapping via Microsoft.WinGet.Client"
            Install-PackageProvider -Name NuGet -Force -Scope CurrentUser | Out-Null
            Install-Module -Name Microsoft.WinGet.Client -Force -Scope CurrentUser
            Repair-WinGetPackageManager -Latest
          }
          winget --version
          # Local manifest install is gated behind an admin-enabled setting.
          winget settings --enable LocalManifestFiles

      # Force provisioning from a clean state so the run actually exercises the
      # installer's az/azd setup rather than finding them preinstalled.
      - name: Uninstall az/azd (force provisioning from absent)
        continue-on-error: true
        shell: pwsh
        run: |
          winget uninstall --silent --disable-interactivity --accept-source-agreements --id Microsoft.AzureCLI
          winget uninstall --silent --disable-interactivity --accept-source-agreements --id Microsoft.Azd

      - name: Install (winget --manifest --silent)
        timeout-minutes: 10
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # `--silent` applies the manifest's Silent switch (`--channel winget --ensure`).
          # Omitting it makes winget launch the exe with no args -> nested-winget deadlock.
          winget install --manifest "$env:MANIFEST_DIR" --silent `
            --disable-interactivity `
            --accept-package-agreements --accept-source-agreements
          if ($LASTEXITCODE -ne 0) { throw "winget install failed with $LASTEXITCODE" }

      - name: Verify prerequisites installed
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # The skill file is the PATH-robust anchor (winget's user-PATH edits
          # aren't visible to a shell started before install).
          $skill = Join-Path $env:USERPROFILE ".agents\skills\microsoft-foundry\SKILL.md"
          if (-not (Test-Path $skill)) { throw "microsoft-foundry skill not found at $skill" }
          Write-Host "OK: microsoft-foundry skill present"

          # Best-effort az/azd/ext checks after refreshing PATH from the registry.
          $machine = [Environment]::GetEnvironmentVariable("Path", "Machine")
          $user = [Environment]::GetEnvironmentVariable("Path", "User")
          $env:Path = "$machine;$user"
          az version
          azd version
          azd ext list --installed
          if (-not (azd ext list --installed | Select-String -Quiet -Pattern 'microsoft\.foundry')) {
            throw "azd Foundry extension not found"
          }
          Write-Host "OK: az + azd + microsoft.foundry extension all present"
