name: Verify winget

on:
  push:
    branches: [main]
    paths:
      - "winget/**"
      - ".github/workflows/verify-winget.yml"
  workflow_dispatch:

permissions:
  contents: read

# Smoke test for the winget channel: [x64, arm64] x [baseline, no-az, with-code].
#   baseline  - runner as-is
#   no-az     - uninstall az first; winget re-adds it via the manifest dependency
#               (degenerate, like the brew cask case: validates dependency resolution)
#   with-code - install VS Code first so the binary installs the VS Code Foundry extension
#
# Notes learned the hard way:
#   * MUST pass `--silent` so winget applies the Silent InstallerSwitches
#     (`--channel winget --ensure`). With no args the exe defaults to
#     channel=direct and shells out to a NESTED `winget install` -> deadlock.
#   * Local manifests need `winget settings --enable LocalManifestFiles` (admin).
#   * windows-11-arm runners do NOT ship winget; bootstrap via PSResourceGet +
#     Repair-WinGetPackageManager, then add the repaired shim dir
#     (%LOCALAPPDATA%\Microsoft\WinGet\Links) to PATH.
#   * Verify anchors on the skill file, plus a registry PATH refresh for az/azd.
jobs:
  verify:
    name: winget ${{ matrix.scenario }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, arch: x64,   scenario: baseline,  install_timeout: 3 }
          - { os: windows-latest, arch: x64,   scenario: no-az,     install_timeout: 5 }
          - { os: windows-latest, arch: x64,   scenario: with-code, install_timeout: 5 }
          - { os: windows-11-arm, arch: arm64, scenario: baseline,  install_timeout: 8 }
          - { os: windows-11-arm, arch: arm64, scenario: no-az,     install_timeout: 8 }
          - { os: windows-11-arm, arch: arm64, scenario: with-code, install_timeout: 8 }
    env:
      # The installer downloads release assets from GitHub; give it a token so it
      # isn't throttled by anonymous rate limits. winget runs the exe as a child
      # process, which inherits this environment.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST_DIR: winget/0.0.4
    steps:
      - uses: actions/checkout@v4

      - name: Ensure winget is available
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $links = Join-Path $env:LOCALAPPDATA "Microsoft\WinGet\Links"
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
            Write-Host "winget not found; bootstrapping via Microsoft.WinGet.Client"
            # Use PSResourceGet (built into PowerShell 7.4+); the legacy NuGet
            # PackageProvider bootstrap fails on windows-11-arm runners.
            Install-PSResource -Name Microsoft.WinGet.Client -Repository PSGallery -TrustRepository -Reinstall
            Import-Module Microsoft.WinGet.Client
            Repair-WinGetPackageManager -Latest -Force
            # The repaired winget shim lands in Links, which isn't on PATH yet.
            $env:Path = "$links;$env:Path"
            Add-Content -Path $env:GITHUB_PATH -Value $links
          }
          winget --version
          # Local manifest install is gated behind an admin-enabled setting.
          winget settings --enable LocalManifestFiles

      # --- scenario setup: no-az ---
      - name: "Setup: uninstall az"
        if: matrix.scenario == 'no-az'
        continue-on-error: true
        shell: pwsh
        run: |
          # The manifest declares Microsoft.AzureCLI as a dependency, so `winget
          # install` re-adds it; this mainly validates dependency resolution.
          winget uninstall --silent --disable-interactivity --accept-source-agreements --id Microsoft.AzureCLI

      # --- scenario setup: with-code ---
      - name: "Setup: install VS Code"
        if: matrix.scenario == 'with-code'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          winget install --silent --disable-interactivity `
            --accept-package-agreements --accept-source-agreements `
            --id Microsoft.VisualStudioCode
          $code = Join-Path $env:LOCALAPPDATA "Programs\Microsoft VS Code\bin\code.cmd"
          if (-not (Test-Path $code)) { throw "code CLI not found at $code" }
          & $code --version

      - name: Install (winget --manifest --silent)
        timeout-minutes: ${{ matrix.install_timeout }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Make `code` discoverable to the installer (winget's child process
          # inherits this env). No-op when VS Code isn't installed.
          $vscodeBin = Join-Path $env:LOCALAPPDATA "Programs\Microsoft VS Code\bin"
          if (Test-Path $vscodeBin) { $env:Path = "$vscodeBin;$env:Path" }

          # `--silent` applies the manifest's Silent switch (`--channel winget --ensure`).
          # Omitting it makes winget launch the exe with no args -> nested-winget deadlock.
          winget install --manifest "$env:MANIFEST_DIR" --silent `
            --disable-interactivity `
            --accept-package-agreements --accept-source-agreements
          if ($LASTEXITCODE -ne 0) { throw "winget install failed with $LASTEXITCODE" }

      - name: Verify prerequisites installed
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # The skill file is the PATH-robust anchor (winget's user-PATH edits
          # aren't visible to a shell started before install).
          $skill = Join-Path $env:USERPROFILE ".agents\skills\microsoft-foundry\SKILL.md"
          if (-not (Test-Path $skill)) { throw "microsoft-foundry skill not found at $skill" }
          Write-Host "OK: microsoft-foundry skill present"

          # Best-effort az/azd/ext checks after refreshing PATH from the registry.
          $machine = [Environment]::GetEnvironmentVariable("Path", "Machine")
          $user = [Environment]::GetEnvironmentVariable("Path", "User")
          $env:Path = "$machine;$user;$env:Path"
          az version
          azd version
          azd ext list --installed
          if (-not (azd ext list --installed | Select-String -Quiet -Pattern 'microsoft\.foundry')) {
            throw "azd Foundry extension not found"
          }
          Write-Host "OK: az + azd + microsoft.foundry extension all present"

      - name: Verify VS Code extension
        if: matrix.scenario == 'with-code'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vscodeBin = Join-Path $env:LOCALAPPDATA "Programs\Microsoft VS Code\bin"
          $env:Path = "$vscodeBin;$env:Path"
          if (-not (code --list-extensions | Select-String -Quiet -Pattern 'ms-windows-ai-studio.windows-ai-studio')) {
            throw "VS Code Foundry extension not installed"
          }
          Write-Host "OK: VS Code Foundry extension present"
